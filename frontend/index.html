<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon: same PNG as the logo for now. Replace with a 32x32
         optimized icon when the designer delivers a dedicated favicon. -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <title>Vaacha — AI subtitles, made for Indian creators</title>
    <meta name="description" content="Add stylized AI-generated subtitles to your reels and shorts in Hindi, Gujarati, and English. Made for Indian creators." />
    <meta name="theme-color" content="#0B1A33" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vaacha.app/" />
    <meta property="og:title" content="Vaacha — AI subtitles, made for Indian creators" />
    <meta property="og:description" content="Add stylized AI-generated subtitles to your reels and shorts in Hindi, Gujarati, and English." />
    <meta property="og:image" content="https://vaacha.app/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Add stylized AI-generated subtitles to your reels and shorts in Hindi, Gujarati, and English." />
    <meta name="twitter:image" content="https://vaacha.app/logo.png" />

    <!-- Fonts: Inter for UI + Vaacha brand surfaces (modern, Indic-safe).
         The creator-font set below is kept for the subtitle overlay in the
         workspace; those don't get loaded on the landing page surface. -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />
