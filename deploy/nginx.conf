# AutoSub nginx config for an IP-only Ubuntu 24.04 deploy.
#
# Place at /etc/nginx/sites-available/autosub, symlink into sites-enabled,
# then `nginx -t && systemctl reload nginx`. The setup.sh script does this.
#
# When you later add a domain + SSL via certbot:
#   1. Edit `server_name _;` → `server_name autosub.yourdomain.com;`
#   2. Run `certbot --nginx -d autosub.yourdomain.com`
#   3. Certbot rewrites this file in place to add the 443 server block.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large video uploads. Default 1M chokes anything past a short clip.
    client_max_body_size 500M;

    # API routes proxy to uvicorn on localhost. The trailing slash on
    # proxy_pass strips the /api/ prefix so /api/jobs/x → /jobs/x upstream.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FFmpeg burns + Gemini transcriptions can take 30 – 60 s for short
        # clips. Don't let nginx 504 in the middle.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Stream large uploads through directly rather than buffering the
        # whole file before passing it on.
        proxy_request_buffering off;
    }

    # Frontend: serve the Vite-built static bundle.
    root /root/autosub/frontend/dist;
    index index.html;

    # SPA routing — every non-file path falls back to index.html so React
    # Router (or our state-driven views) can handle routes on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for the hashed JS/CSS bundles Vite emits.
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|svg|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
